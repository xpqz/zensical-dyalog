[project]
site_name = "Documentation"
repo_url = "https://github.com/dyalog/documentation"
copyright = "Made with <a href=\"https://squidfunk.github.io/mkdocs-material/\" target=\"_blank\" rel=\"noopener\"><strong>Material for MkDocs</strong></a><br/>Copyright &copy; 1982-$CURRENT_YEAR <strong><a href=\"https://dyalog.com\" target=\"_blank\" rel=\"noopener\">Dyalog Limited</a></strong> (<a href=\"#\" class=\"copy\" onclick=\"navigator.clipboard.writeText(innerText);return false\" title=\"Click to copy!\">$BUILD_DATE $GIT_INFO</a>).<br/>Except where otherwise noted, content on this site is licensed under a <a href=\"https://creativecommons.org/licenses/by/4.0/\" target=\"_blank\" rel=\"noopener\"><strong>Creative Commons Attribution 4.0 International</strong></a> licence."
extra_css = [
    "documentation-assets/css/main.css",
    "documentation-assets/css/extra.css",
    "documentation-assets/css/admonition-ucmdhelp.css",
    "documentation-assets/css/windows-ui-guide.css",
]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]
plugins = [
    "privacy",
    "search",
    "macros",
    { minify = { minify_html = true } },
]
markdown_extensions = [
    "admonition",
    "pymdownx.details",
    "pymdownx.keys",
    "pymdownx.superfences",
    { "pymdownx.arithmatex" = { generic = true } },
    { "pymdownx.highlight" = { use_pygments = false, pygments_lang_class = true } },
    "attr_list",
    "abbr",
    "footnotes",
    "md_in_html",
    "markdown_tables_extended",
    { toc = { title = "On this page" } },
    "dyalog_caption",
]
site_url = "https://docs.dyalog.com/"

[project.theme]
favicon = "documentation-assets/images/favicon-32.png"
logo = "documentation-assets/images/dyalog-logo_white.svg"
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.path",
    "navigation.indexes",
    "navigation.sections",
    "navigation.footer",
]
name = "material"
custom_dir = "overrides"

[project.theme.font]
text = "Be Vietnam Pro"

[project.extra]
version_maj = 21
version_majmin = "21.0"
version_min = 0
version_condensed = 210
conga_version = 3.6
conga_version_condensed = 36
generator = false

[project.extra.version]
provider = "mike"

